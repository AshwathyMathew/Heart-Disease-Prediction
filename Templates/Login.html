<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="static/bootstrap.min.css" rel="stylesheet">
    <script src="static/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body> 
    <form method="post"> 
      <div class="container-fluid">
        <div class="row p-3">
            <div class="col text-center d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #fdc500; ">
                <img src="static/Heart_Disease_Sign_up.png" alt="Heart Disease Sign Up" class="img-fluid">
            </div> 
            <div class="col text-center align-items-center" style="background-color: #003f88; height:100vh; padding-top: 150px;">
              <div class="row m-4">
               <h1 clas="p-5">Log In</h1> 
              </div>
              <div class="row m-4">
                <input type="email" name="username" class="form-control" placeholder="Enter Username" required>
              </div>
              <div class="row m-4">
                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
              </div>
            <div class="row m-4">
                <input type="submit" name="submit" formaction="{{ url_for('login')}}" class="btn btn-success" value="Log In">
              </div>
              <div class="row m-4">
                <a href="{{url_for('SignUp')}}">New User, click here</a>
              </div>
        </div>
      </div>
      <div class="row p-2 m-2">
        <div class="col">
            {{msg}}
        </div>
    </div>
    </form>
</body>
</html>
