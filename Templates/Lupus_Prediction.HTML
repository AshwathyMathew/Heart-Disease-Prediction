
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link href="static/bootstrap.min.css" rel="stylesheet">
    <script src="static/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <form Method="post"> 
        <a href="{{url_for('Dashboard')}}" class="btn btn-success m-3"> 
            Home
        </a>
    <div class="container-fluid">
        <div class="row p-3 m-1">
            <div class="col text-center"><h1>Lupus Prediction</h1></div>
        </div>
        <div class="row">
            <div class="col text-center">
                <img src="static/Lupus_image.webp" alt="Heart Disease" class="img-fluid"> 
            </div>
            <div class="col">
                <div class="row m-1">
                    <h2>Fill the form below to check if you have Lupus Disease or not!</h2>
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="Age" placeholder="Enter your age: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="Gender" placeholder="Enter your gender: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="Sickness_time_duration" placeholder="Enter Your Sickness time duration: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="Esbach" placeholder="Enter your Esbach: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="MBL_Level" placeholder="Enter your MBL Level: ">
                </div>                          
                <div class="row m-1">
                    <input type="number" class="form-control" name="ESR" placeholder="Enter your ESR: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="C3" placeholder="Enter your C3: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="C4" placeholder="Enter your C4: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="CRP" placeholder="Enter your CRP: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="ANA" placeholder="Enter your ANA: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="ANTIdsDNA" placeholder="Enter your ANTIdsDNA: ">
                </div>
                <div class="row m-1">
                    <input type="number" class="form-control" name="SLE_DAI" placeholder="Enter your SLE-DAI: ">
                </div>
                <div class="alert alert-primary" role="alert">
                    {{output}}
                  </div>
            <div class="row m-1 text-center">
                <input formaction="{{url_for('Lupusprediction')}}" type="submit" class="btn btn-primary" name="submit" value="Predict">
            </div>
        </div>
    </div>
</form>
</body>
</html>
